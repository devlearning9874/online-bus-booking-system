services:
  db:
    image: mysql:8.1
    container_name: obr_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-secret}
      MYSQL_DATABASE: ${DB_NAME:-onlinebusbooking}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p${DB_PASS:-secret} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: obr_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: obr_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: obr_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://obr_kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      
      # FIX: Use standard native Confluent JMX environment variables.
      # This prevents Java from double-binding the RMI socket ports.
      JMX_PORT: 9997
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false"
    ports:
      - "9092:9092"
      - "9997:9997"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server obr_kafka:29092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: obr_kafka_ui
    restart: unless-stopped
    ports:
      - "8089:8080"
    depends_on:
      - kafka
       # condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=obr-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=obr_kafka:29092
      - KAFKA_CLUSTERS_0_METRICS_TYPE=JMX
      - KAFKA_CLUSTERS_0_METRICS_PORT=9997 # Kafbat connects to the primary entry port


  prometheus:
    image: prom/prometheus:latest
    container_name: obr_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allows Prometheus to scrape apps running on your host machine

  grafana:
    image: grafana/grafana:latest
    container_name: obr_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default login credentials (admin / admin)
    depends_on:
      - prometheus


networks:
  default:
    name: obr_network

  